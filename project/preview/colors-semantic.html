<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tokens semânticos</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-fg-body)">
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-bg);border:1px solid var(--gb-border);border-radius:6px"></span><span>--gb-bg</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-bg-alt);border:1px solid var(--gb-border);border-radius:6px"></span><span>--gb-bg-alt</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-surface);border:1px solid var(--gb-border);border-radius:6px"></span><span>--gb-surface</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-bg-dark);border-radius:6px"></span><span>--gb-bg-dark</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-action);border-radius:6px"></span><span>--gb-action</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-action-soft);border-radius:6px"></span><span>--gb-action-soft</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-fg);border-radius:6px"></span><span>--gb-fg</span></div>
  <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--gb-fg-decor);border-radius:6px"></span><span>--gb-fg-decor</span></div>
</div>

</div>
</body>
</html>
