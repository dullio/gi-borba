<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradientes de superfície</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  
  <div>
    <div style="height:90px;border-radius:14px;background:linear-gradient(160deg,#F7F2EB,#EDE5D8 50%,#D8E8CA)"></div>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:8px;text-align:center">Hero</div>
  </div>
  <div>
    <div style="height:90px;border-radius:14px;background:linear-gradient(135deg,#969370,#757248)"></div>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:8px;text-align:center">CTA Section</div>
  </div>
  <div>
    <div style="height:90px;border-radius:14px;background:linear-gradient(145deg,#D8E8CA,#8EAB6E)"></div>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:8px;text-align:center">Natureza</div>
  </div>
  <div>
    <div style="height:90px;border-radius:14px;background:linear-gradient(145deg,#6B4C32,#3E2D1C)"></div>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:8px;text-align:center">Noite</div>
  </div>
</div>

</div>
</body>
</html>
