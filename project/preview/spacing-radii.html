<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bordas arredondadas</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px">
  
  <div style="text-align:center">
    <div style="background:var(--gb-white);border:1.5px solid var(--gb-border-strong);height:60px;border-radius:4px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark);margin-top:8px">4px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">XS</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);border:1.5px solid var(--gb-border-strong);height:60px;border-radius:10px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark);margin-top:8px">10px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">SM</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);border:1.5px solid var(--gb-border-strong);height:60px;border-radius:16px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark);margin-top:8px">16px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">MD</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);border:1.5px solid var(--gb-border-strong);height:60px;border-radius:20px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark);margin-top:8px">20px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">LG</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);border:1.5px solid var(--gb-border-strong);height:60px;border-radius:40px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark);margin-top:8px">40px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">Pill</div>
  </div>
</div>

</div>
</body>
</html>
