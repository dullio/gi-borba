<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Motivos decorativos</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
  
  <div style="background:var(--gb-white);border:1px solid var(--gb-border);border-radius:14px;padding:18px 12px;text-align:center">
    <svg viewBox="0 0 80 80" width="60" height="60"><path d="M22 66 Q27 56 33 48" stroke="#8EAB6E" stroke-width="1" fill="none" stroke-linecap="round"/><path d="M33 48 C 28 36, 38 18, 60 14 C 57 32, 50 52, 33 48 Z" stroke="#8EAB6E" stroke-width="1.2" fill="rgba(142,171,110,0.12)"/><path d="M33 48 Q 45 32 58 17" stroke="#8EAB6E" stroke-width="0.6" fill="none" opacity="0.7"/></svg>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:10px">Folha</div>
  </div>
  <div style="background:var(--gb-white);border:1px solid var(--gb-border);border-radius:14px;padding:18px 12px;text-align:center">
    <svg viewBox="0 0 80 80" width="60" height="60"><circle cx="40" cy="40" r="28" stroke="#C4A882" stroke-width="1" fill="none"/><circle cx="40" cy="40" r="20" stroke="#C4A882" stroke-width="0.6" fill="none" opacity="0.5"/><circle cx="40" cy="40" r="12" stroke="#C4A882" stroke-width="0.4" fill="none" opacity="0.3"/><circle cx="40" cy="40" r="3" fill="#C4A882"/></svg>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:10px">Círculo</div>
  </div>
  <div style="background:var(--gb-white);border:1px solid var(--gb-border);border-radius:14px;padding:18px 12px;text-align:center">
    <svg viewBox="0 0 80 80" width="60" height="60"><line x1="40" y1="10" x2="40" y2="70" stroke="#9A7F5F" stroke-width="0.8"/><path d="M24 28 Q32 20 40 26 Q48 20 56 28" stroke="#757248" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M22 38 Q31 28 40 36 Q49 28 58 38" stroke="#8EAB6E" stroke-width="1" fill="none" stroke-linecap="round"/><path d="M26 50 Q33 40 40 46 Q47 40 54 50" stroke="#C4A882" stroke-width="0.8" fill="none" stroke-linecap="round"/></svg>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:10px">Ramo</div>
  </div>
  <div style="background:var(--gb-white);border:1px solid var(--gb-border);border-radius:14px;padding:18px 12px;text-align:center">
    <svg viewBox="0 0 80 80" width="60" height="60"><line x1="6" y1="40" x2="32" y2="40" stroke="#D9CEBB" stroke-width="1"/><circle cx="40" cy="40" r="5" fill="#C4A882"/><line x1="48" y1="40" x2="74" y2="40" stroke="#D9CEBB" stroke-width="1"/></svg>
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-top:10px">Divisor</div>
  </div>
</div>

</div>
</body>
</html>
