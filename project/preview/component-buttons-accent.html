<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Botões — boho & warm</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
  <button style="font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;padding:14px 28px;border-radius:40px;background:var(--gb-cana);color:var(--gb-white);">Inspire Trip</button>
  <button style="font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;padding:14px 28px;border-radius:40px;background:var(--gb-taupe);color:var(--gb-white);">Entrar em Contato</button>
</div>
<div style="margin-top:14px;font-family:var(--gb-font-body);font-size:11px;color:var(--gb-fg-body)">
  <strong style="color:var(--gb-fg)">Cana</strong> · acentos de natureza (retiros) · <strong style="color:var(--gb-fg)">Taupe</strong> · WhatsApp, contato
</div>

</div>
</body>
</html>
