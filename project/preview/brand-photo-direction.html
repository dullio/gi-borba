<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Direção de fotografia</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-radius:14px;overflow:hidden">
  
  <div style="aspect-ratio:3/4;background:linear-gradient(145deg,#EDE5D8,#C8B99A);position:relative">
    <span style="position:absolute;bottom:8px;left:8px;font-family:var(--gb-font-body);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.95);background:rgba(62,45,28,0.42);padding:3px 8px;border-radius:20px">Natural · Warm</span>
  </div>
  <div style="aspect-ratio:3/4;background:linear-gradient(145deg,#D8E8CA,#B8CFA0);position:relative">
    <span style="position:absolute;bottom:8px;left:8px;font-family:var(--gb-font-body);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.95);background:rgba(62,45,28,0.42);padding:3px 8px;border-radius:20px">Natureza · Verde</span>
  </div>
  <div style="aspect-ratio:3/4;background:linear-gradient(145deg,#C8C5A3,#969370);position:relative">
    <span style="position:absolute;bottom:8px;left:8px;font-family:var(--gb-font-body);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.95);background:rgba(62,45,28,0.42);padding:3px 8px;border-radius:20px">Movimento</span>
  </div>
  <div style="aspect-ratio:3/4;background:linear-gradient(145deg,#C8B99A,#9A7F5F);position:relative">
    <span style="position:absolute;bottom:8px;left:8px;font-family:var(--gb-font-body);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.95);background:rgba(62,45,28,0.42);padding:3px 8px;border-radius:20px">Detalhe · Close</span>
  </div>
</div>

</div>
</body>
</html>
