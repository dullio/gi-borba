<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card de programa</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="width:300px;border-radius:20px;overflow:hidden;box-shadow:var(--gb-shadow-md);background:var(--gb-white)">
  <div style="height:120px;background:linear-gradient(135deg,var(--gb-cana-pale),var(--gb-cana));position:relative;display:flex;align-items:center;justify-content:center">
    <span style="font-family:var(--gb-font-script);font-size:36px;color:var(--gb-white);opacity:0.35;position:absolute">resgate</span>
    <svg width="36" height="36" viewBox="0 0 48 48" fill="none" style="position:relative">
      <circle cx="24" cy="16" r="8" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" fill="none"/>
      <path d="M12 40c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" fill="none"/>
    </svg>
  </div>
  <div style="padding:18px 20px">
    <div style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--gb-taupe);margin-bottom:6px">Programa Principal</div>
    <div style="font-family:var(--gb-font-display);font-size:22px;font-weight:400;color:var(--gb-fg);line-height:1.2;margin-bottom:6px">Yoga Online Ao Vivo</div>
    <div style="font-family:var(--gb-font-body);font-size:12px;color:var(--gb-fg-body);line-height:1.6">4 aulas/semana com tema de cura e identidade.</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--gb-border)">
      <span style="font-family:var(--gb-font-display);font-size:22px;font-weight:500;color:var(--gb-olive)">R$760<span style="font-size:11px;font-weight:300;color:var(--gb-fg-body)">/mês</span></span>
    </div>
  </div>
</div>

</div>
</body>
</html>
