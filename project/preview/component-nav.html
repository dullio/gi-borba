<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top nav</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">
<div style="background:rgba(247,242,235,0.96);backdrop-filter:blur(12px);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:18px;height:72px;border:1px solid var(--gb-border);border-radius:14px">

  <img src="../assets/logo-taupe.png" alt="Gi Borba Yoga" style="height:46px;width:auto;flex-shrink:0">

  <div style="display:flex;gap:18px;flex:1;justify-content:center;min-width:0">
    <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-olive);white-space:nowrap">Início</span>
    <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-fg-body);white-space:nowrap">Programa</span>
    <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-fg-body);white-space:nowrap">Inspire Trip</span>
    <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-fg-body);white-space:nowrap">Sobre</span>
    <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-fg-body);white-space:nowrap">Depoimentos</span>
  </div>

  <span style="font-family:var(--gb-font-body);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--gb-white);background:var(--gb-olive);padding:9px 18px;border-radius:40px;white-space:nowrap;flex-shrink:0">Aula Gratuita</span>

</div>
</div>
</body>
</html>
