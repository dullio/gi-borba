<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Escala de espaçamento (base 8)</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;align-items:end">
  
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:4px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">4px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">xs</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:8px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">8px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">sm</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:16px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">16px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">md</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:32px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">32px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">lg</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:64px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">64px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">xl</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-olive-muted);border-radius:4px 4px 0 0;margin:0 auto 8px;width:36px;height:96px"></div>
    <div style="font-family:var(--gb-font-mono);font-size:11px;color:var(--gb-taupe-dark)">96px</div>
    <div style="font-family:var(--gb-font-body);font-size:10px;color:var(--gb-fg-body);letter-spacing:0.1em;text-transform:uppercase">2xl</div>
  </div>
</div>

</div>
</body>
</html>
