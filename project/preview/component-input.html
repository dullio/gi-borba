<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form input</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="max-width:380px">
  <label style="display:block;font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-bottom:8px">Como prefere ser chamada?</label>
  <input style="width:100%;box-sizing:border-box;font-family:var(--gb-font-body);font-size:14px;font-weight:300;color:var(--gb-fg);background:var(--gb-cream);border:1.5px solid var(--gb-border);border-radius:10px;padding:12px 16px;outline:none" value="Ana Paula" />
  <div style="margin-top:14px"></div>
  <label style="display:block;font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gb-taupe-dark);margin-bottom:8px">Como está se sentindo?</label>
  <input style="width:100%;box-sizing:border-box;font-family:var(--gb-font-body);font-size:14px;font-weight:300;color:var(--gb-fg);background:var(--gb-cream);border:1.5px solid var(--gb-olive);border-radius:10px;padding:12px 16px;outline:none" placeholder="Pode ser honesta, estou aqui para isso" />
</div>

</div>
</body>
</html>
