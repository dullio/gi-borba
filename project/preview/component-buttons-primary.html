<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Botões — primário & secundário</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
  <button style="font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;padding:14px 28px;border-radius:40px;background:var(--gb-olive);color:var(--gb-white);">Aula Gratuita</button>
  <button style="font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;padding:14px 28px;border-radius:40px;background:transparent;border:1.5px solid var(--gb-taupe);color:var(--gb-fg);">Saiba Mais</button>
  <button style="font-family:var(--gb-font-body);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;border:none;cursor:pointer;padding:14px 28px;border-radius:40px;background:transparent;color:var(--gb-fg-body);padding:14px 0 14px 0;border-bottom:1px solid var(--gb-taupe);border-radius:0;">Ver depoimentos</button>
</div>
<div style="margin-top:14px;font-family:var(--gb-font-body);font-size:11px;color:var(--gb-fg-body);letter-spacing:0.02em">
  <strong style="color:var(--gb-fg)">Primário (Oliva)</strong> · CTA principal · <strong style="color:var(--gb-fg)">Secundário</strong> · ações alternativas · <strong style="color:var(--gb-fg)">Ghost</strong> · links internos
</div>

</div>
</body>
</html>
