<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sombras (warm brown)</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:8px 0 16px">
  
  <div style="text-align:center">
    <div style="background:var(--gb-white);height:60px;border-radius:14px;box-shadow:0 1px 2px rgba(62,45,28,0.04)"></div>
    <div style="font-family:var(--gb-font-mono);font-size:10px;color:var(--gb-taupe-dark);margin-top:10px">--gb-shadow-xs</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);height:60px;border-radius:14px;box-shadow:0 2px 16px rgba(62,45,28,0.08)"></div>
    <div style="font-family:var(--gb-font-mono);font-size:10px;color:var(--gb-taupe-dark);margin-top:10px">--gb-shadow-sm</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);height:60px;border-radius:14px;box-shadow:0 4px 24px rgba(62,45,28,0.07)"></div>
    <div style="font-family:var(--gb-font-mono);font-size:10px;color:var(--gb-taupe-dark);margin-top:10px">--gb-shadow-md</div>
  </div>
  <div style="text-align:center">
    <div style="background:var(--gb-white);height:60px;border-radius:14px;box-shadow:0 12px 40px rgba(62,45,28,0.12)"></div>
    <div style="font-family:var(--gb-font-mono);font-size:10px;color:var(--gb-taupe-dark);margin-top:10px">--gb-shadow-lg</div>
  </div>
</div>

</div>
</body>
</html>
